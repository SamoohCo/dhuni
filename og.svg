<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E1008"/>

  <!-- Subtle cloth texture overlay -->
  <rect width="1200" height="630" fill="url(#cloth)" opacity="0.18"/>
  <defs>
    <pattern id="cloth" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="none"/>
      <line x1="0" y1="3" x2="12" y2="3" stroke="#888068" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="9" x2="12" y2="9" stroke="#888068" stroke-width="0.5" opacity="0.3"/>
      <line x1="3" y1="0" x2="3" y2="12" stroke="#888068" stroke-width="0.8" opacity="0.5"/>
      <line x1="9" y1="0" x2="9" y2="12" stroke="#888068" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Vignette -->
  <radialGradient id="vign" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vign)"/>

  <!-- Brass top rule -->
  <rect x="120" y="120" width="960" height="2" rx="1" fill="url(#brass-line)"/>
  <rect x="120" y="510" width="960" height="2" rx="1" fill="url(#brass-line)"/>
  <defs>
    <linearGradient id="brass-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="25%"  stop-color="#C89A2C"/>
      <stop offset="50%"  stop-color="#F0C048"/>
      <stop offset="75%"  stop-color="#C89A2C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Radio emoji -->
  <text x="600" y="300" text-anchor="middle" dominant-baseline="middle" font-size="160">📻</text>

  <!-- Dhuni wordmark -->
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#C0A038"
    style="text-shadow: 0 0 30px rgba(192,160,56,0.6)">धुनि</text>

  <!-- Tagline -->
  <text x="600" y="476" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" letter-spacing="6" fill="rgba(168,138,60,0.65)" text-transform="uppercase">VINTAGE INDIAN RADIO</text>

  <!-- Samooh attribution -->
  <text x="600" y="542" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="16" letter-spacing="3" fill="rgba(168,138,60,0.35)">A SAMOOH PRODUCTION</text>
</svg>
