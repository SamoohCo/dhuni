<!DOCTYPE html>
<html lang="hi-Latn-IN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>धुनि — Dhuni Radio</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#D4A843"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Dhuni"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Courier+Prime&family=Hind:wght@400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="cabinet">
  <div id="bezel"></div>

  <!-- Speaker -->
  <div id="speaker-section">
    <div id="grille-frame">
      <div id="cloth"></div>
    </div>
    <div id="nameplate">
      <div id="brand-badge"><span class="brand-name" lang="hi">धुनि</span></div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">

    <div class="knob-wrap">
      <div class="knob" id="vol-knob"></div>
      <span class="knob-label">Vol</span>
    </div>

    <div id="centre">

      <!-- Freq band -->
      <div id="freq-band-wrap">
        <div id="freq-band">
          <div id="band-inner"></div>
          <div id="needle"></div>
        </div>
      </div>

      <!-- Station display -->
      <div id="stn-display-wrap">
        <div id="stn-display">
          <div id="stn-name"></div>
          <div id="stn-desc"></div>
        </div>
      </div>

      <!-- Playback -->
      <div id="playback">
        <button class="pbtn" id="btn-prev">
          <svg viewBox="0 0 16 16"><path d="M11 3L5 8l6 5V3z"/><rect x="3" y="3" width="2" height="10" rx="1"/></svg>
          PREV
        </button>
        <button id="play-btn"><span id="play-icon">&#9654;</span></button>
        <button class="pbtn" id="btn-next">
          NEXT
          <svg viewBox="0 0 16 16"><path d="M5 3l6 5-6 5V3z"/><rect x="11" y="3" width="2" height="10" rx="1"/></svg>
        </button>
      </div>

    </div>

    <div class="knob-wrap">
      <div class="knob" id="tune-knob"></div>
      <span class="knob-label">Tune</span>
    </div>

    <div id="footer"><a href="https://samooh.com" target="_blank">a Samooh production</a></div>
  </div>
</div>

<div id="grain"></div>

<!-- Hidden YouTube player -->
<div id="yt-player" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

<script src="stations.js"></script>
<script src="main.js"></script>
<script src="https://www.youtube.com/iframe_api" async></script>

</body>
</html>
