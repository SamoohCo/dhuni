<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dhuni by Samooh — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #06080A;
      --soil:    #1A1208;
      --ember:   #C4671A;
      --gold:    #FFD66B;
      --cream:   #F5ECD7;
      --smoke:   rgba(245, 236, 215, 0.06);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: 'Courier Prime', monospace;
      color: var(--cream);
      cursor: default;
    }

    /* ── STARS ─────────────────────────────────────────── */
    #stars {
      position: fixed; inset: 0;
      background:
        radial-gradient(1px 1px at 12% 8%,  rgba(255,230,180,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 34% 15%, rgba(255,230,180,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 56% 5%,  rgba(255,230,180,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 12%, rgba(255,230,180,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 7%,  rgba(255,230,180,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 23% 22%, rgba(255,230,180,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 28%, rgba(255,230,180,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 19%, rgba(255,230,180,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 25%, rgba(255,230,180,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  32%, rgba(255,230,180,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 19% 38%, rgba(255,230,180,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 33%, rgba(255,230,180,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 94% 41%, rgba(255,230,180,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 8%  18%, rgba(255,240,200,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 62% 10%, rgba(255,240,200,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 83% 20%, rgba(255,240,200,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── GROUND ─────────────────────────────────────────── */
    #ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 38%;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 3px,
          rgba(26,18,8,0.6) 3px, rgba(26,18,8,0.6) 4px
        ),
        linear-gradient(
          to bottom,
          #1A1208 0%,
          #0F0B05 40%,
          #080604 100%
        );
      z-index: 1;
    }

    /* ground pixel texture row */
    #ground::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #2A1E0A 0px, #2A1E0A 8px,
        #1A1208 8px, #1A1208 16px,
        #221608 16px, #221608 24px,
        #1A1208 24px, #1A1208 32px
      );
    }

    /* ── FIRE GLOW (ambient light on ground) ─────────────── */
    #glow {
      position: fixed;
      bottom: 34%;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 180px;
      background: radial-gradient(ellipse at 50% 80%,
        rgba(255, 140, 20, 0.22) 0%,
        rgba(196, 103, 26, 0.12) 40%,
        transparent 70%
      );
      filter: blur(18px);
      z-index: 2;
      animation: glowPulse 2.2s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      0%   { opacity: 0.7; transform: translateX(-50%) scaleX(0.95); }
      100% { opacity: 1.0; transform: translateX(-50%) scaleX(1.05); }
    }

    /* ── FIRE CANVAS ────────────────────────────────────── */
    #fire-wrap {
      position: fixed;
      bottom: 36%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      image-rendering: pixelated;
    }

    canvas#fire {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── LOGS (pixel art) ───────────────────────────────── */
    #logs {
      position: fixed;
      bottom: 36%;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 20px;
      z-index: 4;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }

    .log {
      width: 48px; height: 12px;
      border-radius: 2px;
      position: absolute;
    }
    .log-l {
      background: linear-gradient(to bottom, #5C3010 0%, #3A1E08 100%);
      transform: rotate(-18deg) translateX(-18px) translateY(2px);
      box-shadow: inset 0 2px 0 rgba(255,180,80,0.15), 2px 2px 0 #1A0A04;
    }
    .log-r {
      background: linear-gradient(to bottom, #5C3010 0%, #3A1E08 100%);
      transform: rotate(18deg) translateX(18px) translateY(2px);
      box-shadow: inset 0 2px 0 rgba(255,180,80,0.15), 2px 2px 0 #1A0A04;
    }
    .log-c {
      background: linear-gradient(to bottom, #6A3814 0%, #3A1E08 100%);
      transform: translateY(0px);
      box-shadow: inset 0 2px 0 rgba(255,180,80,0.2), 2px 2px 0 #1A0A04;
      z-index: 1;
    }

    /* ── SMOKE PARTICLES ────────────────────────────────── */
    .smoke {
      position: fixed;
      bottom: 52%;
      left: 50%;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(200,190,175,0.12);
      z-index: 5;
      pointer-events: none;
      animation: smokeRise 4s ease-out infinite;
    }
    .smoke:nth-child(1) { animation-delay: 0s;    margin-left: -4px; }
    .smoke:nth-child(2) { animation-delay: 1.1s;  margin-left: 6px;  }
    .smoke:nth-child(3) { animation-delay: 2.3s;  margin-left: -12px;}
    .smoke:nth-child(4) { animation-delay: 0.6s;  margin-left: 14px; }
    .smoke:nth-child(5) { animation-delay: 1.8s;  margin-left: 2px;  }

    @keyframes smokeRise {
      0%   { transform: translateY(0)   translateX(0)    scale(1);   opacity: 0.18; }
      30%  { transform: translateY(-40px) translateX(8px)  scale(2);   opacity: 0.12; }
      60%  { transform: translateY(-90px) translateX(-6px) scale(3.5); opacity: 0.07; }
      100% { transform: translateY(-160px) translateX(10px) scale(5);  opacity: 0; }
    }

    /* ── UI CONTENT ─────────────────────────────────────── */
    #content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(32px, 8vh, 72px);
      pointer-events: none;
    }

    .wordmark {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 6vw, 52px);
      color: var(--gold);
      letter-spacing: 0.08em;
      text-shadow:
        0 0 8px rgba(255,214,107,0.8),
        0 0 24px rgba(255,214,107,0.4),
        0 0 48px rgba(196,103,26,0.3);
      margin-bottom: 12px;
      animation: wordmarkFlicker 8s ease-in-out infinite;
    }

    @keyframes wordmarkFlicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.85; }
      97%            { opacity: 1; }
      98%            { opacity: 0.9; }
    }

    .tagline {
      font-family: 'Courier Prime', monospace;
      font-size: clamp(10px, 1.8vw, 14px);
      color: rgba(245, 236, 215, 0.55);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    /* ── BOTTOM STRIP ───────────────────────────────────── */
    #bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .bottom-label {
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(245,236,215,0.25);
      pointer-events: auto;
    }

    .bottom-label a {
      color: rgba(255,214,107,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    .bottom-label a:hover { color: rgba(255,214,107,0.85); }

    .dot { color: rgba(255,214,107,0.2); }

    /* ── TICKER ─────────────────────────────────────────── */
    #ticker-wrap {
      position: fixed;
      bottom: 48px; left: 0; right: 0;
      height: 24px;
      overflow: hidden;
      z-index: 15;
      border-top: 1px solid rgba(255,214,107,0.08);
      border-bottom: 1px solid rgba(255,214,107,0.08);
      background: rgba(6,8,10,0.6);
    }

    #ticker {
      display: inline-block;
      white-space: nowrap;
      font-family: 'Courier Prime', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,214,107,0.35);
      text-transform: uppercase;
      line-height: 24px;
      animation: tickerScroll 70s linear infinite;
      padding-left: 100vw;
    }

    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* ── GRAIN ──────────────────────────────────────────── */
    #grain {
      position: fixed; inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
  </style>
</head>
<body>

  <div id="stars"></div>
  <div id="ground"></div>
  <div id="glow"></div>

  <!-- 8-bit fire canvas -->
  <div id="fire-wrap">
    <canvas id="fire" width="128" height="96"></canvas>
  </div>

  <!-- pixel logs -->
  <div id="logs">
    <div class="log log-l"></div>
    <div class="log log-c"></div>
    <div class="log log-r"></div>
  </div>

  <!-- smoke -->
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>

  <!-- main UI -->
  <div id="content">
    <div class="wordmark">धुनि</div>
    <div class="tagline">Coming Soon</div>
  </div>

  <!-- ticker -->
  <div id="ticker-wrap">
    <div id="ticker">
      Broadcasting from the subcontinent &nbsp;&nbsp;◆&nbsp;&nbsp;
      Tuning in &nbsp;&nbsp;◆&nbsp;&nbsp;
      A Samooh production &nbsp;&nbsp;◆&nbsp;&nbsp;
      Indian classical &nbsp;·&nbsp; old Bollywood &nbsp;·&nbsp; lo-fi ragas &nbsp;&nbsp;◆&nbsp;&nbsp;
      The sacred fire never goes out &nbsp;&nbsp;◆&nbsp;&nbsp;
      dhuni.net &nbsp;&nbsp;◆&nbsp;&nbsp;
      Broadcasting from the subcontinent &nbsp;&nbsp;◆&nbsp;&nbsp;
      Tuning in &nbsp;&nbsp;◆&nbsp;&nbsp;
    </div>
  </div>

  <!-- bottom -->
  <div id="bottom">
    <span class="bottom-label"><a href="https://samooh.com" target="_blank">Powered by Samooh</a></span>
    <span class="dot">◆</span>
    <span class="bottom-label">dhuni.net</span>
  </div>

  <div id="grain"></div>

  <script>
    // ── 8-BIT FIRE (Doom-style, throttled + shaped) ─────────────────
    const canvas = document.getElementById('fire');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const PIXEL = 4;
    const COLS = W / PIXEL;  // 32
    const ROWS = H / PIXEL;  // 24

    // Palette: black → deep red → orange → gold → cream
    const PALETTE = [
      [0,   0,   0  ],
      [10,  4,   2  ],
      [24,  8,   2  ],
      [40,  12,  2  ],
      [64,  16,  2  ],
      [90,  22,  4  ],
      [120, 32,  4  ],
      [150, 48,  6  ],
      [176, 64,  8  ],
      [196, 90,  14 ],
      [210, 110, 18 ],
      [220, 130, 24 ],
      [230, 150, 30 ],
      [238, 170, 48 ],
      [244, 190, 70 ],
      [250, 210, 100],
      [254, 224, 140],
      [255, 235, 175],
      [255, 242, 210],
    ];
    const MAX = PALETTE.length - 1;

    let grid = new Uint8Array(COLS * ROWS);

    // Pre-compute a bell-curve shaped seed mask across the base columns.
    // Columns near the centre get full intensity; edges taper to zero —
    // this is what breaks the rectangle and gives a natural flame silhouette.
    function baseSeed(x) {
      const cx = (COLS - 1) / 2;
      const sigma = COLS * 0.28;          // controls how wide the base is
      const bell = Math.exp(-0.5 * Math.pow((x - cx) / sigma, 2));
      return Math.round(bell * MAX);
    }

    function seedFire() {
      for (let x = 0; x < COLS; x++) {
        const peak = baseSeed(x);
        if (peak < 2) {
          // At the edges, keep it cold most of the time
          grid[(ROWS - 1) * COLS + x] = Math.random() < 0.15 ? 1 : 0;
          grid[(ROWS - 2) * COLS + x] = 0;
        } else {
          const jitter = Math.floor(Math.random() * 3);
          grid[(ROWS - 1) * COLS + x] = Math.max(0, peak - jitter);
          grid[(ROWS - 2) * COLS + x] = Math.max(0, peak - jitter - Math.floor(Math.random() * 2));
        }
      }
    }

    function stepFire() {
      seedFire();
      for (let y = 0; y < ROWS - 1; y++) {
        for (let x = 0; x < COLS; x++) {
          // Slight upward drift with random horizontal waver
          const drift = Math.floor(Math.random() * 3) - 1;
          const sx = Math.max(0, Math.min(COLS - 1, x + drift));
          const below = grid[(y + 1) * COLS + sx];
          // Higher decay rate = shorter, slower-looking flame
          const decay = Math.random() < 0.65 ? 1 : 0;
          grid[y * COLS + x] = Math.max(0, below - decay);
        }
      }
    }

    function drawFire() {
      ctx.clearRect(0, 0, W, H);
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const v = grid[y * COLS + x];
          if (v === 0) continue;
          const [r, g, b] = PALETTE[Math.min(v, MAX)];
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(x * PIXEL, y * PIXEL, PIXEL, PIXEL);
        }
      }
    }

    // ── THROTTLE: only simulate every Nth animation frame ──
    // 60fps rAF → step every 5 frames ≈ 12 simulation steps/sec
    // Makes the fire feel slow, meditative, campfire-like
    const STEP_EVERY = 5;
    let frameCount = 0;

    function loop() {
      frameCount++;
      if (frameCount % STEP_EVERY === 0) {
        stepFire();
        drawFire();
      }
      requestAnimationFrame(loop);
    }

    seedFire();
    loop();
  </script>
</body>
</html>
